<VirtualHost *:80>
    ServerName geo.sisdacimancis.id
    ServerAlias www.geo.sisdacimancis.id
    Redirect permanent / https://geo.sisdacimancis.id/
</VirtualHost>
<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    ServerName geo.sisdacimancis.id
    DocumentRoot /var/www/html
    # --- SSL Configuration ---
    SSLEngine on
    SSLCertificateFile /etc/ssl/sisdacimancis.id/STAR_sisdacimancis_id.crt
    SSLCertificateKeyFile /etc/ssl/sisdacimancis.id/sisdacimancis.id.key
    SSLCertificateChainFile /etc/ssl/sisdacimancis.id/CABundle.crt
    # --- REVERSE PROXY FOR GEOSERVER ---
    ProxyPreserveHost On
    ProxyPass /geoserver http://127.0.0.1:8082/geoserver
    ProxyPassReverse /geoserver http://127.0.0.1:8082/geoserver
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "geo.sisdacimancis.id"
    Header edit Location ^http://geo.sisdacimancis.id/ https://geo.sisdacimancis.id/
    # --- Directory Permissions ---
    <Directory /var/www/html/acces>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <Directory /var/www/html/geocimancis>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <Directory /var/www/html/geocimancis/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <Directory /var/www/html/geoportal_cimancis>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <Directory /var/www/html/sigab>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    # --- CGI & PHP SSL Options ---
    <FilesMatch "\.(cgi|shtml|phtml|php)$">
        <IfModule mod_ssl.c>
            SSLOptions +StdEnvVars
        </IfModule>
    </FilesMatch>
    <Directory /usr/lib/cgi-bin>
        <IfModule mod_ssl.c>
            SSLOptions +StdEnvVars
        </IfModule>
    </Directory>
    # --- Browser Compatibility & Logging ---
    BrowserMatch "MSIE [2-6]" nokeepalive ssl-unclean-shutdown downgrade-1.0 force-response-1.0
    BrowserMatch "MSIE [17-9]" ssl-unclean-shutdown
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    LimitRequestBody 52428800
</VirtualHost>